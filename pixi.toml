[workspace]
authors = ["Raphael Maser <raphaelmaser@gmail.com>"]
channels = ["conda-forge", "nvidia"]
name = "llava-more"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "13"


[dependencies]
python = ">=3.12.0,<3.13"
cuda-nvcc = "12.9.*"
cuda-version = "12.9.*"
gxx = "*"
ninja = "*"
ipykernel = ">=7.1.0,<8"
setuptools = "*"

[pypi-dependencies]
accelerate = ">=0.33.0"
aiohttp = ">=3.9.5"
altair = ">=5.3.0"
beartype = ">=0.22.6,<0.23"
blinker = ">=1.7.0"
bcos = ">=0.1.2,<0.2"
cachetools = ">=5.3.3"
captum = ">=0.8.0,<0.9"
cmasher = ">=1.9.2,<2"
click = ">=8.1.7"
cmake = ">=3.25.0"
colorama = ">=0.4.6"
datasets = ">=2.19.1"
decord = ">=0.6.0"
deepspeed = ">=0.12.6"
dill = ">=0.3.8"
einops = ">=0.7.0"
evaluate = ">=0.4.2"
fairscale = ">=0.4.4"
faiss-cpu = ">=1.7.4"
filelock = ">=3.13.3"
fire = ">=0.5.0"
fsspec = ">=2024.2.0"
ftfy = ">=6.2.0"
hf_transfer = ">=0.1.6"
huggingface-hub = ">=0.23.3"
imageio = ">=2.34.0"
jaxtyping = ">=0.3.2,<0.4"
joblib = ">=1.4.2"
kaggle = ">=1.6.8"
lightning = ">=2.5.6,<3"
loguru = ">=0.7.3,<0.8"
lxt = ">=2.1,<3"
markdown-it-py = ">=3.0.0"
matplotlib = ">=3.7.5"
networkx = ">=3.0"
numpy = ">=1.24.1"
omegaconf = ">=2.3.0"
opencv-python-headless = ">=4.5.5.64"
opendatasets = ">=0.1.22"
pandas = ">=2.0.3"
peft = ">=0.18.1"
pillow = ">=10.2.0"
plotly = ">=5.20.0"
protobuf = ">=4.25.3"
psutil = ">=5.9.8"
pyarrow = ">=15.0.0"
pycocoevalcap = ">=1.2"
pycocotools = ">=2.0.7"
pydantic = ">=2.6.4"
pytablewriter = ">=1.2.0"
requests = ">=2.32.3"
rich = ">=13.7.1"
sacrebleu = ">=2.4.2"
safetensors = ">=0.4.2"
scikit-image = ">=0.21.0"
scikit-learn = ">=1.3.2"
scipy = ">=1.10.1"
seaborn = ">=0.13.2,<0.14"
sentencepiece = ">=0.2.0"
sqlitedict = ">=2.1.0"
spacy = ">=3.7.4"
streamlit = ">=1.32.2"
sympy = ">=1.12"
tabulate = ">=0.9.0"
timm = ">=0.4.12"
toml = ">=0.10.2"
torch = "==2.9.1"
torchaudio = "==2.9.1"
torchvision = "==0.24.1"
tqdm = ">=4.66.2"
transformers = ">=4.56.0,<4.57"
ujson = ">=5.9.0"
wandb = ">=0.16.4"
webdataset = ">=0.2.86"
hydra-core = ">=1.3.2"
#sglang = { version = "*", extras = ["all"] }

# Local editable install to make aloe imports available
interpretability-thesis = { path = "../aloe-align_once_to_explain", editable = true }
s2wrapper = { git = "https://github.com/bfshi/scaling_on_scales.git", rev = "3bbee376f98fcd0e670ef6814416e35d5454e803" }

[activation.env]
ALOE_REPO_ROOT = "/u/rmaser/aloe-align_once_to_explain"
CACHE_PATH = "/dais/fs/scratch/rmaser/aloe-align_once_to_explain/.cache_v3"
DATA_PATH = "/dais/fs/scratch/rmaser/data/huggingface/datasets"
HF_HUB_OFFLINE = "0"
HF_HUB_CACHE = "/dais/fs/scratch/rmaser/aloe-align_once_to_explain/.cache_v3"
HF_DATASETS_CACHE = "/dais/fs/scratch/rmaser/data/huggingface/datasets"
TOKENIZERS_PARALLELISM = "false"
TRANSFORMERS_VERBOSITY = "info"
WANDB_ENTITY = "raphaelmaser"
WANDB_PROJECT = "llava-more"
WANDB_MODE = "online"
